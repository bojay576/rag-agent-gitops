apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ingress
  namespace: rag-app
  labels:
    app: rag-frontend
    component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
spec:
  rules:
  - host: rag.127-0-0-1.sslip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rag-frontend-svc
            port:
              number: 3000
  # Production example:
  # tls:
  # - hosts:
  #   - rag.example.com
  #   secretName: rag-tls
