# =============================================================================
# RAG Backend Secret — LLM API 密钥（敏感信息）
# =============================================================================
# 安全提醒：
#   - 请勿将此文件提交到公开仓库（生产环境建议使用 Sealed Secrets 或 External Secrets）
#   - 如果使用 Ollama 模式（本地 LLM），无需填写 API Key
#   - 如果使用 OpenAI/Anthropic 模式，必须填写对应 Key
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: rag-backend-secret
  namespace: rag-app
  labels:
    app: rag-backend
type: Opaque
stringData:
  # ---- LLM API Key ----
  # OpenAI 格式示例: sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  # Anthropic 格式示例: sk-ant-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  LLM_API_KEY: "your-llm-api-key-here"

  # ---- Embedding API Key ----
  # 如果 Embedding 和 LLM 使用同一个提供商，此处可以与 LLM_API_KEY 相同
  # 如果使用不同提供商（如 Anthropic 生成 + VoyageAI 嵌入），填写对应的 Key
  # 如果使用 Ollama 模式，无需填写
  EMBEDDING_API_KEY: "your-embedding-api-key-here"
