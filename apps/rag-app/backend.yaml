apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-backend
  namespace: rag-app
  labels:
    app: rag-backend
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-backend
  template:
    metadata:
      labels:
        app: rag-backend
        component: backend
    spec:
      containers:
      - name: backend
        image: rag-backend:v1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP

        # ---- 环境变量 ----
        # 从 ConfigMap 加载非敏感配置
        envFrom:
        - configMapRef:
            name: rag-backend-config
        # 从 Secret 加载敏感配置（API Key）
        - secretRef:
            name: rag-backend-secret

        # 直接定义的环境变量（覆盖或补充 ConfigMap）
        env:
        # 保留对 MILVUS_ADDRESS 的直接引用（由 ConfigMap 提供降级值）
        # 如果 ConfigMap 未加载成功，使用此默认值
        - name: MILVUS_ADDRESS_FALLBACK
          value: "milvus.milvus.svc.cluster.local:19530"

        # ---- 资源限制 ----
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"

        # ---- 健康检查 ----
        startupProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 30      # 最多等待 5 分钟

        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        # ---- 安全上下文 ----
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      # 如果使用私有镜像仓库，取消下面注释
      # imagePullSecrets:
      # - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: rag-backend-svc
  namespace: rag-app
  labels:
    app: rag-backend
    component: backend
spec:
  type: ClusterIP
  selector:
    app: rag-backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
    name: http
