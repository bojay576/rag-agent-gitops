apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: rag-app
  labels:
    app: rag-frontend
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-frontend
  template:
    metadata:
      labels:
        app: rag-frontend
        component: frontend
    spec:
      containers:
      - name: frontend
        image: rag-frontend:v1.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP

        # ---- 环境变量（后端服务地址）----
        env:
        - name: BACKEND_URL
          value: "http://rag-backend-svc.rag-app.svc.cluster.local:8080"

        # ---- 资源限制 ----
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        # ---- 健康检查 ----
        startupProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 12      # 最多等待 1 分钟

        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3

        # ---- 安全上下文 ----
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      # 如果使用私有镜像仓库，取消下面注释
      # imagePullSecrets:
      # - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: rag-frontend-svc
  namespace: rag-app
  labels:
    app: rag-frontend
    component: frontend
spec:
  type: NodePort
  selector:
    app: rag-frontend
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    name: http
