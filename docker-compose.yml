services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command:
    - etcd
    - -advertise-client-urls=http://127.0.0.1:2379
    - -listen-client-urls=http://0.0.0.0:2379
    - --data-dir=/etcd
    volumes:
    - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
    - "9000:9000"
    - "9001:9001"
    volumes:
    - minio-data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.4.0
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
    - "19530:19530"
    - "9091:9091"
    volumes:
    - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy

  ollama:
    image: ollama/ollama:0.6.8
    ports:
    - "11434:11434"
    volumes:
    - ollama-data:/root/.ollama

  backend:
    build:
      context: ./apps/rag-app/backend
    image: rag-backend:v1.0
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_API_BASE: ${LLM_API_BASE:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      MILVUS_ADDRESS: ${MILVUS_ADDRESS:-milvus-standalone:19530}
      KNOWLEDGE_BASE_PATH: /knowledge-base
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-5}
      RETRIEVAL_SCORE_THRESHOLD: ${RETRIEVAL_SCORE_THRESHOLD:-0.5}
    ports:
    - "8080:8080"
    volumes:
    - ./knowledge-base:/knowledge-base:ro
    depends_on:
    - milvus-standalone
    - ollama

  frontend:
    build:
      context: ./apps/rag-app/frontend
    image: rag-frontend:v1.0
    environment:
      BACKEND_URL: ${BACKEND_URL:-http://backend:8080}
    ports:
    - "3000:3000"
    depends_on:
    - backend

volumes:
  etcd-data:
  minio-data:
  milvus-data:
  ollama-data:
