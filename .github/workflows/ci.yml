name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: "Run deploy.sh after CI"
        required: false
        default: "false"

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Lint YAML
      run: |
        python -m pip install yamllint
        yamllint -c .yamllint.yml apps/ docker-compose.yml .github/workflows/ci.yml

    - name: Lint shell
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: "."
        format: gcc

    - name: Lint Python
      working-directory: apps/rag-app/backend
      run: |
        python -m pip install ruff black
        ruff check .
        black --check .

  test-backend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Run backend tests
      working-directory: apps/rag-app/backend
      run: |
        python -m pip install -r requirements-dev.txt
        pytest

  test-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: apps/rag-app/frontend/package-lock.json
    - name: Run frontend checks
      working-directory: apps/rag-app/frontend
      run: |
        npm ci
        npm test
        npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
        - name: backend
          context: apps/rag-app/backend
          image: rag-backend
        - name: frontend
          context: apps/rag-app/frontend
          image: rag-frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and push ${{ matrix.name }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context }}
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    if: github.event_name == 'workflow_dispatch' && inputs.deploy == 'true'
    steps:
    - uses: actions/checkout@v4
    - name: Deploy to Kubernetes
      run: ./deploy.sh
